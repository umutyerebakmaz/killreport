type TopPilot {
  rank: Int!
  killCount: Int!
  character: Character
}

input TopPilotsFilter {
  """
  ISO date string YYYY-MM-DD; defaults to today (UTC)
  """
  date: String
  """
  Max 100; default 100
  """
  limit: Int
}

type TopWeeklyPilot {
  rank: Int!
  killCount: Int!
  character: Character
}

input TopWeeklyPilotsFilter {
  """
  ISO date string YYYY-MM-DD for the Monday (start) of the week; defaults to current week's Monday (UTC)
  """
  weekStart: String
  """
  Max 100; default 100
  """
  limit: Int
}

type TopMonthlyPilot {
  rank: Int!
  killCount: Int!
  character: Character
}

input TopMonthlyPilotsFilter {
  """
  Year-month string YYYY-MM; defaults to current month (UTC)
  """
  month: String
  """
  Max 100; default 100
  """
  limit: Int
}

type Top90DaysPilot {
  rank: Int!
  killCount: Int!
  character: Character
}

input Top90DaysPilotsFilter {
  """
  Max 100; default 100
  """
  limit: Int
}

type TopLast7DaysPilot {
  rank: Int!
  killCount: Int!
  character: Character
}

input TopLast7DaysPilotsFilter {
  """
  Max 100; default 100
  """
  limit: Int
  """
  Filter by region ID
  """
  regionId: Int
  """
  Filter by constellation ID
  """
  constellationId: Int
  """
  Filter by solar system ID
  """
  systemId: Int
}

type TopLast7DaysCorporation {
  rank: Int!
  killCount: Int!
  corporation: Corporation
}

input TopLast7DaysCorporationsFilter {
  """
  Max 100; default 100
  """
  limit: Int
  """
  Filter by region ID
  """
  regionId: Int
  """
  Filter by constellation ID
  """
  constellationId: Int
  """
  Filter by solar system ID
  """
  systemId: Int
}

type TopLast7DaysAlliance {
  rank: Int!
  killCount: Int!
  alliance: Alliance
}

input TopLast7DaysAlliancesFilter {
  """
  Max 100; default 100
  """
  limit: Int
  """
  Filter by region ID
  """
  regionId: Int
  """
  Filter by constellation ID
  """
  constellationId: Int
  """
  Filter by solar system ID
  """
  systemId: Int
}

type TopLast7DaysShip {
  rank: Int!
  killCount: Int!
  shipType: Type
}

input TopLast7DaysShipsFilter {
  """
  Max 100; default 100
  """
  limit: Int
  """
  Filter by region ID
  """
  regionId: Int
  """
  Filter by constellation ID
  """
  constellationId: Int
  """
  Filter by solar system ID
  """
  systemId: Int
}

type TopLast7DaysAttackerShip {
  rank: Int!
  killCount: Int!
  shipType: Type
}

input TopLast7DaysAttackerShipsFilter {
  """
  Max 100; default 100
  """
  limit: Int
}

extend type Query {
  """
  Returns top pilots ranked by kill count for a given day (default: today)
  """
  topPilots(filter: TopPilotsFilter): [TopPilot!]!

  """
  Returns top pilots ranked by total kill count for a given week (Mon–Sun); defaults to current week
  """
  topWeeklyPilots(filter: TopWeeklyPilotsFilter): [TopWeeklyPilot!]!

  """
  Returns top pilots ranked by total kill count over the last 7 days (rolling window, today - 6 days)
  """
  topLast7DaysPilots(filter: TopLast7DaysPilotsFilter): [TopLast7DaysPilot!]!

  """
  Returns top corporations ranked by total kill count over the last 7 days (rolling window, today - 6 days)
  """
  topLast7DaysCorporations(
    filter: TopLast7DaysCorporationsFilter
  ): [TopLast7DaysCorporation!]!

  """
  Returns top alliances ranked by total kill count over the last 7 days (rolling window, today - 6 days)
  """
  topLast7DaysAlliances(
    filter: TopLast7DaysAlliancesFilter
  ): [TopLast7DaysAlliance!]!

  """
  Returns top ship types ranked by total kill count over the last 7 days (rolling window, today - 6 days)
  """
  topLast7DaysShips(filter: TopLast7DaysShipsFilter): [TopLast7DaysShip!]!

  """
  Returns top attacker ship types by usage count over the last 7 days (rolling window, today - 6 days)
  """
  topLast7DaysAttackerShips(
    filter: TopLast7DaysAttackerShipsFilter
  ): [TopLast7DaysAttackerShip!]!

  """
  Returns top pilots ranked by total kill count over the last 90 days (rolling window)
  """
  top90DaysPilots(filter: Top90DaysPilotsFilter): [Top90DaysPilot!]!

  """
  Returns top pilots ranked by total kill count for a given calendar month (default: current month)
  """
  topMonthlyPilots(filter: TopMonthlyPilotsFilter): [TopMonthlyPilot!]!
}
