"""
High-level summary of the current sovereignty state.
"""
type SovereigntyOverview {
  ownedSystems: Int!
  activeCampaigns: Int!
  trackedStructures: Int!
  trackedAlliances: Int!
  "Total killmails correlated to active sovereignty campaigns."
  warKills: Int!
  "Total ISK destroyed across all active sovereignty campaigns."
  iskDestroyed: Float!
}

"""
An active sovereignty campaign (contested TCU / IHub / station).
"""
type SovereigntyCampaign {
  campaignId: Int!
  eventType: String!
  solarSystemId: Int!
  solarSystemName: String
  constellationId: Int!
  regionId: Int
  regionName: String
  structureId: String!
  defenderId: Int
  defenderName: String
  defenderTicker: String
  defenderScore: Float
  attackersScore: Float
  startTime: String!
  "Set once the campaign resolves and leaves ESI; null while active."
  endTime: String
  "defender_won / attacker_won / abandoned; null while active or unresolved."
  outcome: String
  "Hours from start to end; null while active."
  durationHours: Float
  "Killmails correlated to this campaign (0 until fighting happens in its window)."
  warKills: Int!
  "ISK destroyed in this campaign's war zone."
  iskDestroyed: Float!
  "ISK lost by the defender side (victim alliance == defender)."
  defenderIskLost: Float!
  "ISK lost by the attacker/third-party side."
  attackerIskLost: Float!
  defenderShipsLost: Int!
  attackerShipsLost: Int!
  "Alliances contesting this campaign (attackers and/or defender) with their score."
  participants: [CampaignParticipant!]!
}

"""
Distribution of resolved campaign outcomes.
"""
type SovereigntyOutcomeStats {
  defenderWon: Int!
  attackerWon: Int!
  abandoned: Int!
  totalResolved: Int!
}

"""
An alliance's defensive record across resolved campaigns it defended.
"""
type AllianceDefenseRecord {
  rank: Int!
  allianceId: Int!
  allianceName: String
  allianceTicker: String
  defensesWon: Int!
  defensesTotal: Int!
  "Won / total, 0..1."
  defenseSuccessRate: Float!
}

"""
A page of resolved (ended) sovereignty campaigns.
"""
type SovereigntyCampaignHistoryPage {
  items: [SovereigntyCampaign!]!
  totalCount: Int!
}

"""
An alliance participating in a sovereignty campaign, with its contest score.
"""
type CampaignParticipant {
  allianceId: Int!
  allianceName: String
  allianceTicker: String
  score: Float!
}

"""
An alliance ranked by the number of systems it currently holds sovereignty over.
"""
type AllianceTerritoryRank {
  rank: Int!
  allianceId: Int!
  allianceName: String
  allianceTicker: String
  systemsControlled: Int!
  ihubCount: Int!
  "From the alliance's most recent daily territory snapshot (0 if no snapshot yet)."
  campaignsAttacking: Int!
  campaignsDefending: Int!
  systemsGained: Int!
  systemsLost: Int!
}

"""
An alliance ranked by activity level from its latest daily territory snapshot.
"""
type AllianceActivityRank {
  rank: Int!
  allianceId: Int!
  allianceName: String
  allianceTicker: String
  campaignsAttacking: Int!
  campaignsDefending: Int!
  systemsGained: Int!
  systemsLost: Int!
}

"""
A tracked sovereignty structure (IHub or TCU) with ownership and timer info.
"""
type SovereigntyStructureInfo {
  structureId: String!
  solarSystemId: Int!
  solarSystemName: String
  regionId: Int
  regionName: String
  allianceId: Int!
  allianceName: String
  allianceTicker: String
  structureTypeId: Int!
  structureTypeName: String!
  "Vulnerability occupancy level (ADM proxy), 1.0..6.0, if reported by ESI."
  occupancyLevel: Float
  vulnerableStartTime: String
  vulnerableEndTime: String
  firstSeen: String!
  lastSeen: String!
}

"""
Count of active sovereignty campaigns in a region.
"""
type RegionCampaignCount {
  regionId: Int!
  regionName: String
  campaignCount: Int!
}

"""
A logged change of sovereignty ownership for a system.
"""
type TerritoryChange {
  id: String!
  solarSystemId: Int!
  solarSystemName: String
  previousOwnerId: Int
  previousOwnerName: String
  newOwnerId: Int
  newOwnerName: String
  changeType: String!
  detectedAt: String!
}

extend type Query {
  "Summary counts for the current sovereignty state."
  sovereigntyOverview: SovereigntyOverview!
  "Currently active sovereignty campaigns, newest first."
  sovereigntyActiveCampaigns(limit: Int): [SovereigntyCampaign!]!
  "Top alliances ranked by number of systems currently controlled."
  allianceTerritoryRankings(limit: Int): [AllianceTerritoryRank!]!
  "Most recently detected territory ownership changes."
  recentTerritoryChanges(limit: Int): [TerritoryChange!]!
  "Alliances ranked by campaigns currently attacking (most aggressive first)."
  mostAggressiveAlliances(limit: Int): [AllianceActivityRank!]!
  "Alliances ranked by campaigns currently defending (most defensive first)."
  mostDefensiveAlliances(limit: Int): [AllianceActivityRank!]!
  "All currently tracked (non-destroyed) sovereignty structures, optionally filtered."
  sovereigntyStructures(allianceId: Int, systemId: Int, limit: Int): [SovereigntyStructureInfo!]!
  "Structures whose vulnerability window opens within the next N hours (default 24), soonest first."
  sovereigntyUpcomingTimers(hoursAhead: Int, limit: Int): [SovereigntyStructureInfo!]!
  "Active sovereignty campaigns grouped by region, hottest first."
  activeCampaignsByRegion(limit: Int): [RegionCampaignCount!]!
  "Resolved (ended) campaigns, newest-ended first, paginated."
  sovereigntyCampaignHistory(limit: Int, offset: Int): SovereigntyCampaignHistoryPage!
  "Distribution of resolved campaign outcomes."
  sovereigntyOutcomeStats: SovereigntyOutcomeStats!
  "Alliances ranked by successful defenses of ended campaigns."
  topDefenders(limit: Int): [AllianceDefenseRecord!]!
}
