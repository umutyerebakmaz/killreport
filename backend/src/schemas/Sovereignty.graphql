"""
High-level summary of the current sovereignty state.
"""
type SovereigntyOverview {
  ownedSystems: Int!
  activeCampaigns: Int!
  trackedStructures: Int!
  trackedAlliances: Int!
  "Total killmails correlated to active sovereignty campaigns."
  warKills: Int!
  "Total ISK destroyed across all active sovereignty campaigns."
  iskDestroyed: Float!
}

"""
An active sovereignty campaign (contested TCU / IHub / station).
"""
type SovereigntyCampaign {
  campaignId: Int!
  eventType: String!
  solarSystemId: Int!
  solarSystemName: String
  constellationId: Int!
  regionId: Int
  regionName: String
  structureId: String!
  defenderId: Int
  defenderName: String
  defenderTicker: String
  defenderScore: Float
  attackersScore: Float
  startTime: String!
  "Killmails correlated to this campaign (0 until fighting happens in its window)."
  warKills: Int!
  "ISK destroyed in this campaign's war zone."
  iskDestroyed: Float!
}

"""
An alliance ranked by the number of systems it currently holds sovereignty over.
"""
type AllianceTerritoryRank {
  rank: Int!
  allianceId: Int!
  allianceName: String
  allianceTicker: String
  systemsControlled: Int!
  ihubCount: Int!
}

"""
A logged change of sovereignty ownership for a system.
"""
type TerritoryChange {
  id: String!
  solarSystemId: Int!
  solarSystemName: String
  previousOwnerId: Int
  previousOwnerName: String
  newOwnerId: Int
  newOwnerName: String
  changeType: String!
  detectedAt: String!
}

extend type Query {
  "Summary counts for the current sovereignty state."
  sovereigntyOverview: SovereigntyOverview!
  "Currently active sovereignty campaigns, newest first."
  sovereigntyActiveCampaigns(limit: Int): [SovereigntyCampaign!]!
  "Top alliances ranked by number of systems currently controlled."
  allianceTerritoryRankings(limit: Int): [AllianceTerritoryRank!]!
  "Most recently detected territory ownership changes."
  recentTerritoryChanges(limit: Int): [TerritoryChange!]!
}
