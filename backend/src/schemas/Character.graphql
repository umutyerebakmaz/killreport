type Character {
  id: Int!
  name: String!
  corporation: Corporation
  alliance: Alliance
  birthday: String!
  bloodline: Bloodline
  race: Race
  gender: String!
  securityStatus: Float
  description: String
  title: String
  faction_id: Int
  updatedAt: String
  topAllianceTargets(filter: TimeFilter): [AllianceTopTarget!]!
  topCorporationTargets(filter: TimeFilter): [CorporationTopTarget!]!
  topShipTargets(filter: TimeFilter): [ShipTopKill!]!
}

type AllianceTopTarget {
  alliance: Alliance!
  killCount: Int!
}

type CorporationTopTarget {
  corporation: Corporation!
  killCount: Int!
}

type ShipTopKill {
  shipType: Type!
  killCount: Int!
}

input CharacterFilter {
  page: Int
  limit: Int
  search: String
  name: String
  corporationId: Int
  allianceId: Int
  orderBy: CharacterOrderBy
}

enum CharacterOrderBy {
  nameAsc
  nameDesc
  securityStatusAsc
  securityStatusDesc
}

type CharactersResponse {
  items: [Character!]!
  pageInfo: PageInfo!
}

extend type Query {
  character(id: Int!): Character
  characters(filter: CharacterFilter): CharactersResponse!
}

extend type Mutation {
  refreshCharacter(characterId: Int!): RefreshCharacterResult!
}

type RefreshCharacterResult {
  success: Boolean!
  message: String!
  characterId: Int!
  queued: Boolean!
}
