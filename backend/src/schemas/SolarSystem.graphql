type Position {
  x: Float!
  y: Float!
  z: Float!
}

type SystemKills {
  id: Int!
  system_id: Int!
  npc_kills: Int!
  pod_kills: Int!
  ship_kills: Int!
  timestamp: String!
  solar_system: SolarSystem
}

type SystemKillsStats {
  system_id: Int!
  system_name: String!
  total_kills: Int!
  latest_ship_kills: Int
  latest_pod_kills: Int
  latest_npc_kills: Int
  latest_timestamp: String
}

input SystemKillsFilter {
  system_id: Int!
  hours: Int # Default 24 hours
}

type SolarSystem {
  id: Int!
  name: String!
  securityStatus: Float
  security_class: String
  star_id: Int
  position: Position
  constellation: Constellation
  latestKills: SystemKills
}

enum SolarSystemOrderBy {
  nameAsc
  nameDesc
  securityStatusAsc
  securityStatusDesc
  shipKillsDesc
  shipKillsAsc
  podKillsDesc
  podKillsAsc
  npcKillsDesc
  npcKillsAsc
}

type SolarSystemsResponse {
  items: [SolarSystem!]!
  pageInfo: PageInfo!
}

input SolarSystemFilter {
  page: Int
  limit: Int
  search: String
  name: String
  region_id: Int
  constellation_id: Int
  securityStatusMin: Float
  securityStatusMax: Float
  orderBy: SolarSystemOrderBy
}

extend type Query {
  solarSystem(id: Int!): SolarSystem
  solarSystems(filter: SolarSystemFilter): SolarSystemsResponse!

  # Get hourly kill snapshots for a specific system (for charts)
  systemKillsHistory(filter: SystemKillsFilter!): [SystemKills!]!

  # Get latest kills for a system
  systemLatestKills(system_id: Int!): SystemKills

  # Get top active systems (most kills in last 24h)
  topActiveSystems(limit: Int): [SystemKillsStats!]!
}

