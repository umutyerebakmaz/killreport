query Corporation($id: Int!, $filter: TimeFilter) {
  corporation(id: $id) {
    id
    name
    ticker
    date_founded
    member_count
    tax_rate
    url
    alliance {
      id
      name
      ticker
    }
    ceo {
      id
      name
    }
    creator {
      id
      name
    }
    metrics {
      memberCountDelta7d
      memberCountGrowthRate7d
    }
    topShipTargets(filter: $filter) {
      killCount
      shipType {
        id
        name
      }
    }
    topAllianceTargets(filter: $filter) {
      killCount
      alliance {
        id
        name
        ticker
      }
    }
    topCorporationTargets(filter: $filter) {
      killCount
      corporation {
        id
        name
        ticker
      }
    }
  }
}

query CorporationGrowth($id: Int!, $days: Int) {
  corporation(id: $id) {
    id
    snapshots(days: $days) {
      date
      memberCount
    }
  }
}
