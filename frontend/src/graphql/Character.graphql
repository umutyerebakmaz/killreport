query Character($id: Int!) {
  character(id: $id) {
    id
    name
    birthday
    securityStatus
    description
    title
    updatedAt
    corporation {
      id
      name
      ticker
    }
    alliance {
      id
      name
      ticker
    }
    topAllianceTargets {
      killCount
      alliance {
        id
        name
      }
    }
    topCorporationTargets {
      killCount
      corporation {
        id
        name
      }
    }
  }
}
