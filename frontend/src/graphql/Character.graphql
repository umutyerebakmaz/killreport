query Character($id: Int!, $filter: TimeFilter) {
  character(id: $id) {
    id
    name
    birthday
    securityStatus
    description
    title
    updatedAt
    corporation {
      id
      name
      ticker
    }
    alliance {
      id
      name
      ticker
    }
    topAllianceTargets(filter: $filter) {
      killCount
      alliance {
        id
        name
        ticker
      }
    }
    topCorporationTargets(filter: $filter) {
      killCount
      corporation {
        id
        name
        ticker
      }
    }
    topShipTargets(filter: $filter) {
      killCount
      shipType {
        id
        name
      }
    }
  }
}
