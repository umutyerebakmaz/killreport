# Independent character statistics queries
# These queries are decoupled from Character query for better performance and parallel execution

query CharacterTopAllianceTargets(
  $characterId: Int!
  $filter: TopTargetFilter
) {
  characterTopAllianceTargets(characterId: $characterId, filter: $filter) {
    killCount
    alliance {
      id
      name
      ticker
    }
  }
}

query CharacterTopCorporationTargets(
