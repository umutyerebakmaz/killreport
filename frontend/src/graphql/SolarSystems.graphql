query SolarSystems($filter: SolarSystemFilter) {
  solarSystems(filter: $filter) {
    items {
      id
      name
      securityStatus
      constellation {
        id
        name
        region {
          id
          name
        }
      }
      latestKills {
        ship_kills
        pod_kills
        npc_kills
        timestamp
      }
    }
    pageInfo {
      currentPage
      totalPages
      totalCount
      hasNextPage
      hasPreviousPage
    }
  }
}

query SolarSystem($id: Int!) {
  solarSystem(id: $id) {
    id
    name
    securityStatus
    security_class
    star_id
    position {
      x
      y
      z
    }
    constellation {
      id
      name
      region {
        id
        name
      }
    }
  }
}
