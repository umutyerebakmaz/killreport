query SovereigntyDashboard {
  sovereigntyOverview {
    ownedSystems
    activeCampaigns
    trackedStructures
    trackedAlliances
    warKills
    iskDestroyed
  }
  allianceTerritoryRankings(limit: 25) {
    rank
    allianceId
    allianceName
    allianceTicker
    systemsControlled
    ihubCount
  }
  sovereigntyActiveCampaigns(limit: 50) {
    campaignId
    eventType
    solarSystemId
    solarSystemName
    regionName
    defenderId
    defenderName
    defenderTicker
    defenderScore
    attackersScore
    startTime
    warKills
    iskDestroyed
  }
  recentTerritoryChanges(limit: 25) {
    id
    solarSystemId
    solarSystemName
    previousOwnerId
    previousOwnerName
    newOwnerId
    newOwnerName
    changeType
    detectedAt
  }
}
