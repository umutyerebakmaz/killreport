<div class="container min-h-screen mx-auto pb-55 md:pb-72">
    <div class="grid grid-cols-3 gap-4 pt-5">
        <div class="col-span-1 p-4 bg-neutral-950"><character-info-card [character]="character"></character-info-card></div>
        <div class="col-span-2 p-4 bg-neutral-950"><rank-info-card [rank]="rank"></rank-info-card></div>
    </div>
    <div>
        <most-valuable-kills></most-valuable-kills>
    </div>
    <div class="mt-8">
        <h2 class="font-semibold">Recent Activity</h2>

        <div class="shadow ring-1 ring-neutral-600">
            <kill-table-row></kill-table-row>
        </div>
        <kill-table></kill-table>

        <mat-paginator #paginator
        [pageSize]="10"
        [pageSizeOptions]="[5, 10, 20]"
        [showFirstLastButtons]="true">
</mat-paginator>
    </div>
</div>
