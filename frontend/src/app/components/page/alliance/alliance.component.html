<div class="container min-h-screen mx-auto pb-55 md:pb-72">
    <div class="grid grid-cols-3 gap-4 pt-5">
        <div class="col-span-1 p-4 bg-neutral-950">
            <alliance-info-card [alliance]="alliance"></alliance-info-card>
        </div>
        <div class="col-span-2 p-4 bg-neutral-950">
            <rank-info-card [rank]="rank"></rank-info-card>
        </div>
    </div>
    <div>
        <most-valuable-kills [data]="mostValuableKillsMockup"></most-valuable-kills>
    </div>

    <div class="flex gap-4 mt-8">
        <div class="grow">
            <h2 class="font-semibold">Recent Activity</h2>
            <kill-table [rows]="rows"></kill-table>
        </div>
        <div class="w-1/5">
            <h2 class="font-semibold">Top Characters</h2>
            <top-characters-card></top-characters-card>
        </div>
    </div>
</div>
