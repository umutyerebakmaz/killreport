<div class="transition duration-700 ease-in-out cursor-pointer hover:scale-110 transform-gpu group">
    <img [src]="item.image"  alt="Phoenix">
    <div class="mt-3 text-lg font-semibold tracking-tight">{{ item.type }}</div>
    <div class="mb-3 text-base text-gray-600">{{ item.character }}</div>
    <span class="inline-flex items-center px-2 py-1 text-xs font-medium text-gray-400 rounded-md bg-gray-400/10 ring-1 ring-inset ring-gray-400/20">{{ item.amount }}</span>
</div>
