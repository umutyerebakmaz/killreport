<div class="flex">
    <div>
        <img src="https://images.evetech.net/characters/365974960/portrait?size=128" />
    </div>
    <div class="px-2 text-yellow-500">
        <div class="flex items-center">
            <a class="transition duration-300 ease-in-out hover:text-yellow-300" routerLink="/character">
                {{ character.name }}
            </a>
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-6 h-6 pl-1 text-red-500"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"
                />
            </svg>
        </div>
        <div>
            <a class="transition duration-300 ease-in-out hover:text-yellow-300" routerLink="/corporation">
                {{ character.corporation }}
            </a>
             <span class="text-gray-500">{{ character.corporationTicked }}</span>
        </div>
        <div>
            <a class="transition duration-300 ease-in-out hover:text-yellow-300" routerLink="/alliance">
                {{ character.alliance }}
            </a>
             <span class="text-gray-500">&lt;{{ character.allianceTicked }}&gt;</span>
        </div>
        <div class="text-yellow-500">{{ character.security }}</div>
    </div>
</div>
