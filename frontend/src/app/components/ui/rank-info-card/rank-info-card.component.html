<div class="grid grid-cols-4 gap-x-4">
    <button
        type="button"
        class="px-2 py-1 text-sm text-white transition duration-300 ease-in-out rounded-md shadow-sm cursor-pointer bg-white/10 hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 focus:ring-offset-black"
        (click)="onRankFilterChange('ALLTIME')"
    >
        Alltimes
    </button>
    <button
        type="button"
        class="px-2 py-1 text-sm text-white transition duration-300 ease-in-out rounded-md shadow-sm cursor-pointer bg-white/10 hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 focus:ring-offset-black"
        (click)="onRankFilterChange('MONTHLY')"
    >
        Monthly
    </button>
    <button
        type="button"
        class="px-2 py-1 text-sm text-white transition duration-300 ease-in-out rounded-md shadow-sm cursor-pointer bg-white/10 hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 focus:ring-offset-black"
        (click)="onRankFilterChange('WEEKLY')"
    >
        Weekly
    </button>
    <button
        type="button"
        class="px-2 py-1 text-sm text-white transition duration-300 ease-in-out rounded-md shadow-sm cursor-pointer bg-white/10 hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 focus:ring-offset-black"
        (click)="onRankFilterChange('DAILY')"
    >
        Daily
    </button>
</div>

<div class="pt-4">
    <rank-table [rankTable]="rankTable"></rank-table>
</div>
